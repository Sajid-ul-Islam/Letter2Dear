<!DOCTYPE html>
<html lang="bn">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>তোমার জন্য - To My Love</title>
    <!-- PWA & Mobile Optimization -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ff3366">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Serif+Bengali:wght@300;400;500;600;700&family=Atma:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700&family=Dancing+Script:wght@400;700&family=Playwrite+AU+SA:wght@100..400&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/themes.css">
    <link rel="stylesheet" href="css/core.css">
</head>

<body class="theme-default">
    <div class="container" id="app">
        <!-- Background Animation Layer -->
        <div class="background-animation">
            <div class="floating-hearts"></div>
            <div class="floating-flowers"></div>
            <div class="particles"></div>
            <div class="love-symbols"></div>
        </div>

        <header class="header">
            <div class="header-decoration">
                <span class="flower">🌸</span>
                <h1 class="title" id="pageTitle">তোমার জন্য</h1>
                <span class="flower">🌸</span>
            </div>
            <p class="subtitle" id="pageSubtitle">For My Love 💕</p>
            
            <div class="header-actions">
                <button class="start-btn" id="startBtn" style="display: none;">Begin Your Journey</button>
                <button class="secondary-btn" id="backToEditor" style="display: none;">Edit Letter</button>
            </div>
        </header>

        <!-- Editor Mode -->
        <main class="editor-container" id="editorMode">
            <div class="glass-card editor-card">
                <h2>Create Your Love Letter</h2>
                <div class="form-group">
                    <label for="letterInput">Your Message (supports Bengali & English)</label>
                    <textarea id="letterInput" placeholder="Write your heart out here..."></textarea>
                </div>
                
                <div class="form-group">
                    <label>Choose a Theme</label>
                    <div class="theme-selector">
                        <button class="theme-btn active" data-theme="default" style="background: linear-gradient(-45deg, #2d1b4e, #702f4e);">Midnight</button>
                        <button class="theme-btn" data-theme="sunset" style="background: linear-gradient(135deg, #ff5f6d, #ffc371);">Sunset</button>
                        <button class="theme-btn" data-theme="ocean" style="background: linear-gradient(135deg, #2193b0, #6dd5ed);">Ocean</button>
                        <button class="theme-btn" data-theme="forest" style="background: linear-gradient(135deg, #11998e, #38ef7d);">Forest</button>
                        <button class="theme-btn" data-theme="lavender" style="background: linear-gradient(135deg, #834d9b, #d04ed6);">Lavender</button>
                        <button class="theme-btn" data-theme="rose" style="background: linear-gradient(135deg, #ff0844, #ffb199);">Rose</button>
                        <button class="theme-btn" data-theme="galaxy" style="background: linear-gradient(135deg, #0f0c29, #302b63);">Galaxy</button>
                        <button class="theme-btn" data-theme="sakura" style="background: linear-gradient(135deg, #ff9a9e, #fad0c4);">Sakura</button>
                        <button class="theme-btn" data-theme="vintage" style="background: linear-gradient(135deg, #d4ae8d, #e9d5ca);">Vintage</button>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group flex-1">
                        <label>🗓️ Unlock Date (Optional)</label>
                        <input type="date" id="unlockDate">
                    </div>
                    <div class="form-group flex-1">
                        <label>📸 Polaroid Image</label>
                        <div class="upload-wrapper">
                            <input type="file" id="imageUpload" accept="image/*" class="file-input">
                            <input type="url" id="imageUrl" placeholder="Or paste link..." class="url-input">
                        </div>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group flex-1">
                        <label>🎵 Background Music</label>
                        <select id="musicSelect">
                            <option value="none">Silence</option>
                            <option value="romantic">Romantic Piano</option>
                            <option value="lofi">Lo-fi Beat</option>
                            <option value="violin">Emotional Violin</option>
                            <option value="nature">Night Nature</option>
                        </select>
                    </div>
                    <div class="form-group flex-1">
                        <label>🖋️ Handwriting Style</label>
                        <select id="fontSelect">
                            <option value="atma">Handwritten (Default)</option>
                            <option value="dancing">Elegant Cursive</option>
                            <option value="playwrite">Modern Script</option>
                            <option value="outfit">Clean Modern</option>
                        </select>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group flex-1">
                        <label>🎟️ Love Coupon (Optional)</label>
                        <select id="couponSelect">
                            <option value="none">No Coupon</option>
                            <option value="hug">One Giant Hug</option>
                            <option value="dinner">Fancy Dinner Date</option>
                            <option value="coffee">Coffee Morning</option>
                            <option value="movie">Movie Night</option>
                            <option value="custom">Blank Gift Voucher</option>
                        </select>
                    </div>
                    <div class="form-group flex-1">
                        <label>Atmosphere</label>
                        <select id="atmosphereSelect">
                            <option value="none">None</option>
                            <option value="rain">Soft Rain</option>
                            <option value="petals">Falling Rose Petals 🌸</option>
                            <option value="stars">Starry Night</option>
                            <option value="birds">Morning Birds</option>
                        </select>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group flex-1">
                        <label>Password Protection (Optional)</label>
                        <input type="password" id="letterPass" placeholder="Secret word...">
                    </div>
                </div>

                <div class="editor-actions">
                    <button class="primary-btn" id="previewBtn">Preview Letter</button>
                    <button class="primary-btn share-btn" id="generateLinkBtn">Shorten & Copy Link</button>
                </div>

                <div class="share-options" id="shareOptions" style="display: none;">
                    <button class="social-btn whatsapp-btn" id="whatsappBtn">
                        <span class="btn-icon">💬</span> WhatsApp
                    </button>
                    <button class="social-btn telegram-btn" id="telegramBtn">
                        <span class="btn-icon">✈️</span> Telegram
                    </button>
                </div>
                
                <div id="shareStatus" class="share-status"></div>
            </div>
        </main>

        <!-- Locked Mode -->
        <main class="locked-container" id="lockedMode" style="display: none;">
            <div class="glass-card locked-card">
                <div class="lock-icon">🔒</div>
                <h2>This letter is locked</h2>
                <p>It will open on:</p>
                <div class="unlock-countdown" id="countdownTimer">--:--:--</div>
                <button class="secondary-btn" id="backToHome">Go Back</button>
            </div>
        </main>

        <!-- Viewer Mode (Initially Hidden) -->
        <main class="letter-container" id="viewerMode" style="display: none;">
            <div class="envelope-wrapper" id="envelopeWrapper">
                <div class="envelope">
                    <div class="flap"></div>
                    <div class="body"></div>
                    <div class="letter-preview"></div>
                </div>
                <button class="primary-btn open-env-btn" id="openEnvelopeBtn">Tap to Open 💌</button>
            </div>

            <div class="letter-area" id="letterArea" style="display: none;">
                <div id="polaroid" class="polaroid-frame" style="display: none;">
                    <img id="letterImage" src="" alt="Polaroid Memory">
                    <div class="polaroid-text">For You</div>
                </div>

                <div id="loveCoupon" class="coupon-card" style="display: none;">
                    <div class="coupon-content">
                        <span class="coupon-tag">Gift Voucher</span>
                        <h3 id="couponText">One Giant Hug</h3>
                        <p>Redeemable Anytime ❤️</p>
                    </div>
                </div>

                <div class="letter-content glass-card">
                    <div class="letter-text" id="letterText">
                        <!-- Paragraphs will be injected here -->
                    </div>
                </div>

                <div class="reaction-bar" id="reactionBar" style="display: none;">
                    <p>Send a Reaction:</p>
                    <div class="reaction-btns">
                        <button class="react-btn" data-reply="I love you too! ❤️">❤️</button>
                        <button class="react-btn" data-reply="That's so sweet! 🥹">🥹</button>
                        <button class="react-btn" data-reply="Meet me soon! ☕">☕</button>
                        <button class="react-btn" data-reply="Can't wait to see you! 😍">😍</button>
                    </div>
                </div>
            </div>
            <audio id="bgMusic" loop preload="auto"></audio>
        </main>

        <footer class="footer">
            <!-- Buttons moved to header -->
        </footer>
    </div>

    <script type="module" src="js/app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js');
            });
        }
    </script>
</body>

</html>
